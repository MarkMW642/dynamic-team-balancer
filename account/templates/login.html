{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    <title>Login</title>
</head>
<body>
    <h1>Team Balancing System</h1>
  

    <div class="card">
    <h2>User Login</h2>  
    {% if messages %}
        {% for message in messages %}
            <div class="msg-error">{{ message }}</div>
        {% endfor %}
    {% endif %}
    <form method="POST">
        {% csrf_token %}
        <label class="login-form">Username</label><br>
        <input type="text" name="username" required><br><br>

        <label>Password</label><br>
        <input type="password" name="password" required><br><br>

        <button class="btn btn-primary" type="submit">Login</button>

        <br>

        
        <p class="page-subtitle">Don't have an account? Register here.</p>
        <button class="btn btn-secondary" type="button" onclick="window.location.href='{% url 'register' %}'">Register</button>
    </form>
    </div>
</body>
</html>
